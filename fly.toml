app = 'peace-frontend'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile.frontend'
  target = 'prod'

[env]
  AUTH_TRUST_HOST = 'true'
  DATABASE_URL = 'file:/app/data/dev.db'
  NEXT_TELEMETRY_DISABLED = '1'
  NEXT_PUBLIC_WS_URL = 'wss://peace-ml.fly.dev/api/v1/ws/live'
  ML_BACKEND_URL = 'https://peace-ml.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'peace_frontend_data'
  destination = '/app/data'
