services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=peace_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: dev
    ports:
      - "3000:3000"
    environment:
      - ML_BACKEND_URL=http://ml-backend:8000
      - ML_BACKEND_PUBLIC_URL=http://localhost:8000
      - AUTH_TRUST_HOST=true
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:5432/peace_dev
      - NEXTAUTH_SECRET=peace-analyzer-dev-secret-change-in-production
    volumes:
      - ./app:/app/app
      - ./components:/app/components
      - ./hooks:/app/hooks
      - ./lib:/app/lib
      - ./public:/app/public
      - ./prisma:/app/prisma
    depends_on:
      - postgres
      - ml-backend

  ml-backend:
    build:
      context: ./ml-backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8000:8000"
    environment:
      - PEACE_USE_MOCK_MODELS=false
      - PEACE_MODEL_PATH=/app/models/best_model.pt
      - PEACE_DEBUG=true
      - PEACE_CORS_ORIGINS=["http://localhost:3000"]
      - PEACE_JOB_DB_PATH=/app/data/jobs.db
      - PEACE_UPLOAD_DIR=/app/data/uploads
    volumes:
      - ./ml-backend/app:/app/app
      - ./ml-backend/app/models:/app/models
      - ./.docker-data/ml:/app/data

volumes:
  pgdata:
