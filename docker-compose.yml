services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: dev
    ports:
      - "3000:3000"
    environment:
      - ML_BACKEND_URL=http://ml-backend:8000
      - AUTH_TRUST_HOST=true
      - DATABASE_URL=file:/app/data/dev.db
      - NEXTAUTH_SECRET=peace-analyzer-dev-secret-change-in-production
    volumes:
      - ./app:/app/app
      - ./components:/app/components
      - ./hooks:/app/hooks
      - ./lib:/app/lib
      - ./public:/app/public
      - ./prisma:/app/prisma
      - ./.docker-data:/app/data
    depends_on:
      - ml-backend

  ml-backend:
    build:
      context: ./ml-backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8000:8000"
    environment:
      - PEACE_USE_MOCK_MODELS=true
      - PEACE_DEBUG=true
      - PEACE_CORS_ORIGINS=["http://localhost:3000"]
      - PEACE_JOB_DB_PATH=/app/data/jobs.db
      - PEACE_UPLOAD_DIR=/app/data/uploads
    volumes:
      - ./ml-backend/app:/app/app
      - ./ml-backend/app/models:/app/models
      - ./.docker-data/ml:/app/data
